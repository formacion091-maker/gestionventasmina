name: Despliegue FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Publicar en Alwaysdata
    runs-on: ubuntu-latest

    steps:
      - name: Obtener codigo
        uses: actions/checkout@v4

      - name: Instalar lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Sincronizar por FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
        run: |
          FTP_SERVER="${FTP_SERVER:-ftp-mina.alwaysdata.net}"
          FTP_USER="${FTP_USER:-mina}"
          FTP_DIR="${FTP_DIR:-www/cliente1}"

          if [ -z "$FTP_PASSWORD" ]; then
            echo "Falta el secret FTP_PASSWORD en GitHub Actions."
            exit 1
          fi

          echo "Servidor FTP: $FTP_SERVER"
          echo "Usuario FTP: $FTP_USER"
          echo "Directorio remoto: $FTP_DIR"

          lftp -u "$FTP_USER","$FTP_PASSWORD" "$FTP_SERVER" <<EOF
          set ftp:ssl-allow true
          set ftp:ssl-force false
          set ftp:passive-mode true
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          mirror -R --verbose \
            --exclude-glob .git/** \
            --exclude-glob .github/** \
            --exclude-glob imagenes/ninos/*_files/** \
            --exclude-glob **/*.descarga \
            --exclude-glob **/saved_resource.html \
            ./ "$FTP_DIR"
          bye
          EOF
